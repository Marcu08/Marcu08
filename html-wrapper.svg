<svg width="840" height="800" xmlns="http://www.w3.org/2000/svg">
  <foreignObject width="100%" height="100%">
    <html xmlns="http://www.w3.org/1999/xhtml" lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Francesco Marcucci - Bento Grid</title>
        <style>
            body {
                background-color: #121212;
                color: white;
                font-family: Arial, sans-serif;
                margin: 0;
            }
            .grid {
                display: grid;
                grid-template-columns: repeat(2, 1fr);
                gap: 20px;
                width: 800px;
                padding: 20px;
                background: #080b0f;
                border-radius: 10px;
            }
            .box {
                background: #0d1117;
                padding: 20px;
                border-radius: 5px;
                text-align: center;
                display: flex;
                flex-direction: column;
                justify-content: center;
            }
            .bento-img {
                width: 100%;
                border-radius: 10px;
                display: block;
            }
            .profile-box {
                background: url("data:image/webp;base64,```") no-repeat center center/cover;
                border-radius: 15px;
                padding: 0;
            }
            .profile-box > a {
                position: relative;
                border-radius: 10px;
                text-align: center;
                backdrop-filter: blur(3px);
                background: rgba(0, 0, 0, 0.5);
                padding: 20px;
                color: white;
                text-decoration: none;
            }
            .badges-container {
                display: flex;
                flex-direction: column;
                gap: 20px;
            }
            .language-icon {
                width: 40px;
                height: 40px;
                margin: 4px;
            }
            .social-icons {
                display: flex;
                justify-content: center;
                gap: 15px;
                margin-top: 10px;
            }
            .social-icons img {
                width: 32px;
                height: 32px;
            }
            .box > a > svg {
                width: 100%;
                border-radius: 10px;
                display: block;
            }
        </style>
    </head>
    <body>
        <div class="grid">
            <div class="box profile-box" style="grid-column: span 2">
                <a href="https://github.com/Marcu08">
                    <div>
                        <h2>Francesco Marcucci</h2>
                        <p>Sviluppatore appassionato con un occhio per il design e un cuore per l'innovazione. Trasformo idee complesse in soluzioni eleganti e funzionali.</p>
                    </div>
                </a>
            </div>

            <div class="badges-container" style="grid-column: span 1">
                <div class="box">
                    <h3>Le mie competenze</h3>
                    <div class="language-icons">
                        <img class="language-icon" src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/python/python-original.svg" alt="Python" />
                        <img class="language-icon" src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/php/php-original.svg" alt="PHP" />
                        <img class="language-icon" src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/javascript/javascript-original.svg" alt="JavaScript" />
                        <img class="language-icon" src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/typescript/typescript-original.svg" alt="TypeScript" />
                        <img class="language-icon" src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/java/java-original.svg" alt="Java" />
                        <img class="language-icon" src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/csharp/csharp-original.svg" alt="C#" />
                        <img class="language-icon" src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/go/go-original.svg" alt="Go" />
                        <img class="language-icon" src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/rust/rust-original.svg" alt="Rust" />
                        <img class="language-icon" src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/cplusplus/cplusplus-original.svg" alt="C++" />
                        <img class="language-icon" src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/powershell/powershell-original.svg" alt="PowerShell" />
                        <img class="language-icon" src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/html5/html5-original.svg" alt="HTML5" />
                        <img class="language-icon" src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/css3/css3-original.svg" alt="CSS3" />
                    </div>
                </div>
                <div class="box">
                    <h3>Connettiti con me</h3>
                    <div class="social-icons">
                        <a href="https://www.instagram.com/francesco_marcuccii"><img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/instagram/instagram-original.svg" alt="Instagram" /></a>
                        <a href="https://www.linkedin.com/in/francesco-marcucci-b68919306/"><img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/linkedin/linkedin-original.svg" alt="LinkedIn" /></a>
                        <a href="https://www.tiktok.com/@francesco_marcuccii"><img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/tiktok/tiktok-original.svg" alt="TikTok" /></a>
                    </div>
                </div>
            </div>

            <div class="box" style="grid-column: span 1">
                <a href="https://open.spotify.com/user/g94czyi452vvziaas0pheb84q">Error: Invalid Spotify access_token or refresh_token. Possibly the token revoked. Please re-login at https://github.com/kittinan/spotify-github-profile</a>
            </div>

            <div class="box" style="grid-column: span 2">
                <a href="https://github.com/Marcu08">404: Not Found</a>
            </div>
        </div>
    </body>
</html>

  </foreignObject>
</svg>